services:
  offices-api:
    build:
      context: .
      dockerfile: Offices.API/Dockerfile
    container_name: offices-api
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "8002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      # Внутри Docker-сети MongoDB виден по имени контейнера
      - MongoDbSettings__ConnectionString=mongodb://mongodb:27017
      - MongoDbSettings__DatabaseName=MmcOfficesDb
      - RabbitMqSettings__Host=rabbitmq
      - RabbitMqSettings__Username=guest
      - RabbitMqSettings__Password=guest
    networks:
      - medical-network

syntax = "proto3";

option csharp_namespace = "Authorization.API.Protos";

package authClient;

service AuthService {
    rpc SignUp (SignUpRequest) returns (SignUpResponse);
	rpc SignIn (SignInRequest) returns (SignInResponse);
	rpc SignOut (SignOutRequest) returns (SignOutResponse);
	rpc UpdateRefreshToken (UpdateRefreshTokenRequest) returns (UpdateRefreshTokenResponse);
	rpc ConfirmEmail (ConfirmEmailRequest) returns (ConfirmEmailResponse);
}

message SignUpRequest {
	string email = 1;
	string password = 2;
}

message SignUpResponse {
	string message = 1;
}


message SignInRequest {
	string email = 1;
	string password = 2;
}

message SignInResponse {
	string access_token = 1;
	string refresh_token = 2;
	string message = 3;
}


message SignOutRequest {
	string refresh_token = 1;
}

message SignOutResponse {
	string message = 1;
}


message UpdateRefreshTokenRequest {
	string refresh_token = 1;
}
message UpdateRefreshTokenResponse {
	string access_token = 1;
	string refresh_token = 2;
	string message = 3;
}


message ConfirmEmailRequest {
	string confirm_token = 1;
}
message ConfirmEmailResponse {
	bool confirm_status = 1;
	string access_token = 2;
	string refresh_token = 3;
	string message = 4;
}
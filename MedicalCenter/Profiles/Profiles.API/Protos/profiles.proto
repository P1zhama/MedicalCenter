syntax = "proto3";

option csharp_namespace = "Profiles.API.Protos";

package profiles;

service ProfilesService {
    rpc CreatePatientProfile (CreatePatientRequest) returns (CreatePatientResponse);
    rpc LinkExistingPatientProfile (LinkExistingPatientRequest) returns (LinkExistingPatientResponse);
    rpc ForceCreatePatientProfile (ForceCreatePatientRequest) returns (CreatePatientResponse);
    rpc CreatePatientProfileByReceptionist (CreatePatientByReceptionistRequest) returns (CreatePatientResponse);
    rpc CreateDoctorProfile (CreateDoctorRequest) returns (CreateDoctorResponse);
    rpc CreateReceptionistProfile (CreateReceptionistRequest) returns (CreateReceptionistResponse);
}


message CreatePatientRequest {
    string account_id = 1;
    string first_name = 2;
    string last_name = 3;
    string middle_name = 4;
    string phone_number = 5;
    string date_of_birth = 6;
    string photo_url = 7;
}

message MatchedProfile {
    string profile_id = 1;
    string first_name = 2;
    string last_name = 3;
    string middle_name = 4;
    string date_of_birth = 5;
}

message CreatePatientResponse {
    string profile_id = 1;
    bool is_matched = 2;
    string message = 3;
    MatchedProfile matched_profile = 4;
}

message LinkExistingPatientRequest {
    string account_id = 1;
    string patient_id = 2;
}

message LinkExistingPatientResponse {
    bool success = 1;
    string message = 2;
}

message ForceCreatePatientRequest {
    string account_id = 1;
    string first_name = 2;
    string last_name = 3;
    string middle_name = 4;
    string phone_number = 5;
    string date_of_birth = 6;
    string photo_url = 7;
}

message CreatePatientByReceptionistRequest {
    string first_name = 1;
    string last_name = 2;
    string middle_name = 3;
    string date_of_birth = 4;
}

message CreateDoctorRequest {
    string first_name = 1;
    string last_name = 2;
    string middle_name = 3;
    string date_of_birth = 4;
    string email = 5;
    string specialization_id = 6;
    string office_id = 7;
    int32 career_start_year = 8;
    string status = 9;
    string photo_url = 10;
    string created_by = 11;
}

message CreateDoctorResponse {
    string doctor_id = 1;
    string message = 2;
}

message CreateReceptionistRequest {
    string first_name = 1;
    string last_name = 2;
    string middle_name = 3;
    string email = 4;
    string office_id = 5;
    string photo_url = 6;
    string created_by = 7;
}

message CreateReceptionistResponse {
    string receptionist_id = 1;
    string message = 2;
}
